<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scraper de ofertas de empleo - Busca y analiza ofertas de trabajo en múltiples sitios">
    <title>{% block title %}JobHunter{% endblock %} — Scraper de Empleos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
    <!-- Animated background orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="{% url 'core:index' %}" class="navbar-brand">
                <span class="brand-icon">🔍</span>
                <span class="brand-text">Job<span class="brand-accent">Hunter</span></span>
            </a>
            <div class="navbar-links">
                <a href="{% url 'core:index' %}" class="nav-link">
                    <span class="nav-icon">🏠</span> Inicio
                </a>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="container">
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" id="alert-{{ forloop.counter }}">
                <span class="alert-text">{{ message }}</span>
                <button class="alert-close" onclick="this.parentElement.remove()">✕</button>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <!-- Main content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>JobHunter &mdash; Scraper de ofertas de empleo</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
